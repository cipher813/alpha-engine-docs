name: Aggregate system-wide deploy changelog

# Daily cron — lists s3://alpha-engine-research/changelog/, materializes a
# Markdown view, and writes it back to s3://...changelog/CHANGELOG.md.
#
# Why S3 (not committed to this repo): alpha-engine-docs is public, but some
# alpha-engine* repos are private (alpha-engine-config, mnemon proprietary
# bits) and PR titles can carry proprietary detail. Keeping the materialized
# CHANGELOG.md in S3 avoids that leak. Local convenience pull:
#   aws s3 cp s3://alpha-engine-research/changelog/CHANGELOG.md \
#     ~/Development/alpha-engine-docs/private/CHANGELOG.md
#
# Per the system-wide-changelog preference (memory:
# preference_alpha_engine_deploy_changelog.md).

on:
  schedule:
    # Daily 06:00 UTC = pre-market PT — the system has been quiet for ~12h
    # and any deploys from yesterday will all be reflected.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: aggregate-changelog
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: List entries + materialize Markdown
        run: |
          set -euo pipefail

          BUCKET="alpha-engine-research"
          PREFIX="changelog/"

          mkdir -p /tmp/entries

          # Sync down ALL entry JSONs across event-type sub-prefixes:
          # changelog/deploys/, changelog/incidents/, changelog/manual/.
          # Each entry is at depth 4 inside the type-prefix
          # (deploys/YYYY/MM/DDTHHMMSS_repo_sha7.json), so the include
          # pattern matches that shape and skips the materialized
          # CHANGELOG.md at the prefix root.
          aws s3 sync "s3://${BUCKET}/${PREFIX}" /tmp/entries \
            --exclude "*" \
            --include "deploys/*/*/*/*.json" \
            --include "incidents/*/*/*/*.json" \
            --include "manual/*/*/*/*.json" \
            --include "recoveries/*/*/*/*.json"

          ENTRY_COUNT=$(find /tmp/entries -name '*.json' | wc -l | tr -d ' ')
          echo "Loaded ${ENTRY_COUNT} entries"

          python3 - <<'PY' > /tmp/CHANGELOG.md
          import glob, json
          from collections import defaultdict
          from datetime import datetime

          paths = sorted(glob.glob("/tmp/entries/**/*.json", recursive=True),
                         reverse=True)

          entries = []
          for p in paths:
              try:
                  with open(p) as f:
                      e = json.load(f)
                  # Backfill event_type from path-prefix when an old entry
                  # lacks the discriminator (pre-PR-A entries default to deploy).
                  if "event_type" not in e:
                      if "/deploys/" in p:
                          e["event_type"] = "deploy"
                      elif "/incidents/" in p:
                          e["event_type"] = "incident"
                      elif "/manual/" in p:
                          e["event_type"] = "manual"
                      elif "/recoveries/" in p:
                          e["event_type"] = "recovery"
                      else:
                          e["event_type"] = "deploy"
                  entries.append(e)
              except Exception as exc:
                  print(f"# WARN: skipping unreadable {p}: {exc}", flush=True)

          by_day = defaultdict(list)
          for e in entries:
              ts = e.get("ts_utc", "")
              day = ts[:10] if ts else "unknown"
              by_day[day].append(e)

          # Counts by event_type for the header summary.
          type_counts = defaultdict(int)
          for e in entries:
              type_counts[e.get("event_type", "?")] += 1
          counts_str = ", ".join(f"{k}={v}" for k, v in sorted(type_counts.items()))

          print("# Alpha Engine — System-wide Deploy & Event Changelog")
          print()
          print(f"_Auto-generated by `aggregate-changelog.yml` in alpha-engine-docs._  ")
          print(f"_Source: `s3://alpha-engine-research/changelog/{{deploys,incidents,manual,recoveries}}/`._  ")
          print(f"_Last aggregated: {datetime.utcnow().isoformat(timespec='seconds')}Z._  ")
          print(f"_Entries: {len(entries)} ({counts_str}). Repos covered: {len(set(e.get('repo','?') for e in entries))}._")
          print()
          print("Event types:")
          print("- 🚀 **deploy** — code shipped to production via CI")
          print("- 🚨 **incident** — production failure surfaced (SF/Lambda/CloudWatch alarm)")
          print("- 🛠 **manual** — operator action (SSH'd in, ran script, applied IAM, etc.)")
          print("- ✓ **recovery** — system returned to healthy state after an incident")
          print()
          print("---")
          print()

          STATUS_EMOJI = {
              "success": "✅",
              "failure": "❌",
              "merged":  "📥",
              "fired":   "🚨",  # incident
              "logged":  "🛠",  # manual
              "ok":      "✓",  # recovery
          }
          TYPE_EMOJI = {
              "deploy":   "🚀",
              "incident": "🚨",
              "manual":   "🛠",
              "recovery": "✓",
          }

          def trunc(s, n):
              if not s:
                  return ""
              s = s.strip()
              if len(s) <= n:
                  return s
              return s[:n].rstrip() + "…"

          for day in sorted(by_day.keys(), reverse=True):
              print(f"## {day}")
              print()
              for e in sorted(by_day[day], key=lambda x: x.get("ts_utc", "")):
                  ts = e.get("ts_utc", "?")[11:19]
                  etype = e.get("event_type", "deploy")
                  type_emoji = TYPE_EMOJI.get(etype, "•")

                  if etype == "deploy":
                      repo = e.get("repo", "?")
                      pr = e.get("pr_number")
                      title = e.get("pr_title", "")
                      sha7 = e.get("sha7", "?")
                      status = e.get("deploy_status", "?")
                      workflow = e.get("deploy_workflow") or e.get("workflow_name") or ""
                      pr_url = e.get("pr_url") or ""
                      pr_marker = f"[#{pr}]({pr_url})" if pr and pr_url else (f"#{pr}" if pr else "—")
                      status_emoji = STATUS_EMOJI.get(status, "•")
                      print(f"- `{ts}Z` {type_emoji} {status_emoji} **{repo}** {pr_marker} — {title}  ")
                      meta = f"sha `{sha7}`"
                      if workflow:
                          meta += f" · workflow `{workflow}`"
                      print(f"  <sub>{meta}</sub>")
                      body = trunc(e.get("pr_body", ""), 280)
                      if body:
                          # Indent each line of body so it nests under the bullet.
                          for line in body.splitlines():
                              print(f"  > {line}")
                  elif etype == "incident":
                      source = e.get("source", "?")
                      summary = e.get("summary", "")
                      details = trunc(e.get("details", ""), 400)
                      print(f"- `{ts}Z` {type_emoji} **INCIDENT** ({source}) — {summary}  ")
                      if details:
                          for line in details.splitlines():
                              print(f"  > {line}")
                  elif etype == "manual":
                      actor = e.get("actor", "?")
                      summary = e.get("summary", "")
                      details = trunc(e.get("details", ""), 400)
                      print(f"- `{ts}Z` {type_emoji} **MANUAL** ({actor}) — {summary}  ")
                      if details:
                          for line in details.splitlines():
                              print(f"  > {line}")
                  elif etype == "recovery":
                      summary = e.get("summary", "")
                      print(f"- `{ts}Z` {type_emoji} **RECOVERY** — {summary}")
                  else:
                      print(f"- `{ts}Z` • **{etype}** — {e.get('summary', e.get('pr_title', '?'))}")
              print()
          PY

          # Upload back to S3.
          aws s3 cp /tmp/CHANGELOG.md "s3://${BUCKET}/${PREFIX}CHANGELOG.md" \
            --content-type "text/markdown; charset=utf-8"

          echo "::notice::Materialized changelog: s3://${BUCKET}/${PREFIX}CHANGELOG.md (${ENTRY_COUNT} entries)"
