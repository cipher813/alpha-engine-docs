name: Aggregate system-wide deploy changelog

# Daily cron — lists s3://alpha-engine-research/changelog/, materializes a
# Markdown view, and writes it back to s3://...changelog/CHANGELOG.md.
#
# Why S3 (not committed to this repo): alpha-engine-docs is public, but some
# alpha-engine* repos are private (alpha-engine-config, mnemon proprietary
# bits) and PR titles can carry proprietary detail. Keeping the materialized
# CHANGELOG.md in S3 avoids that leak. Local convenience pull:
#   aws s3 cp s3://alpha-engine-research/changelog/CHANGELOG.md \
#     ~/Development/alpha-engine-docs/private/CHANGELOG.md
#
# Per the system-wide-changelog preference (memory:
# preference_alpha_engine_deploy_changelog.md).

on:
  schedule:
    # Daily 06:00 UTC = pre-market PT — the system has been quiet for ~12h
    # and any deploys from yesterday will all be reflected.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: aggregate-changelog
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: List entries + materialize Markdown
        run: |
          set -euo pipefail

          BUCKET="alpha-engine-research"
          PREFIX="changelog/"

          mkdir -p /tmp/entries

          # Sync down all entry JSONs (excluding the materialized CHANGELOG.md
          # itself). S3 sync is fine for ~thousands of entries; revisit if the
          # corpus grows past ~100k objects.
          aws s3 sync "s3://${BUCKET}/${PREFIX}" /tmp/entries \
            --exclude "*" --include "*/*/*/*.json"

          ENTRY_COUNT=$(find /tmp/entries -name '*.json' | wc -l | tr -d ' ')
          echo "Loaded ${ENTRY_COUNT} entries"

          python3 - <<'PY' > /tmp/CHANGELOG.md
          import glob, json, os
          from collections import defaultdict
          from datetime import datetime

          paths = sorted(glob.glob("/tmp/entries/**/*.json", recursive=True),
                         reverse=True)

          entries = []
          for p in paths:
              try:
                  with open(p) as f:
                      entries.append(json.load(f))
              except Exception as exc:
                  print(f"# WARN: skipping unreadable {p}: {exc}")

          # Group by date (UTC) for readability. Within a day: chronological.
          by_day = defaultdict(list)
          for e in entries:
              ts = e.get("ts_utc", "")
              day = ts[:10] if ts else "unknown"
              by_day[day].append(e)

          print("# Alpha Engine — System-wide Deploy Changelog")
          print()
          print(f"_Auto-generated by `aggregate-changelog.yml` in alpha-engine-docs._  ")
          print(f"_Source: `s3://alpha-engine-research/changelog/`. Last aggregated: {datetime.utcnow().isoformat(timespec='seconds')}Z._  ")
          print(f"_Entries: {len(entries)}. Repos covered: {len(set(e.get('repo','?') for e in entries))}._")
          print()
          print("---")
          print()

          for day in sorted(by_day.keys(), reverse=True):
              print(f"## {day}")
              print()
              # Sort within day by ts ascending so earliest deploy of the day shows first.
              for e in sorted(by_day[day], key=lambda x: x.get("ts_utc", "")):
                  ts = e.get("ts_utc", "?")[11:19]  # HH:MM:SS
                  repo = e.get("repo", "?")
                  pr = e.get("pr_number")
                  title = e.get("pr_title", "")
                  sha7 = e.get("sha7", "?")
                  status = e.get("deploy_status", "?")
                  workflow = e.get("deploy_workflow") or e.get("workflow_name") or ""
                  pr_url = e.get("pr_url") or ""

                  pr_marker = f"[#{pr}]({pr_url})" if pr and pr_url else (f"#{pr}" if pr else "—")
                  status_emoji = {"success": "✅", "failure": "❌", "merged": "📥"}.get(status, "•")

                  print(f"- `{ts}Z` {status_emoji} **{repo}** {pr_marker} — {title}  ")
                  if workflow:
                      print(f"  <sub>sha `{sha7}` · workflow `{workflow}`</sub>")
                  else:
                      print(f"  <sub>sha `{sha7}`</sub>")
              print()
          PY

          # Upload back to S3 (well-known location for local pulls).
          aws s3 cp /tmp/CHANGELOG.md "s3://${BUCKET}/${PREFIX}CHANGELOG.md" \
            --content-type "text/markdown; charset=utf-8"

          echo "::notice::Materialized changelog: s3://${BUCKET}/${PREFIX}CHANGELOG.md (${ENTRY_COUNT} entries)"
